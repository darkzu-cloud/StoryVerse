<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryVerse | Share Your Story</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Ambient Animated Kinetic Elements -->
    <div class="bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <!-- Navigation Header Controls -->
    <header>
        <div class="logo">
            <i class="fa-solid fa-feather-pointed animate-feather"></i>
            <span>StoryVerse</span>
        </div>
        
        <div class="controls">
            <!-- 8 Premium Color Options Grid Grid -->
            <div class="theme-picker-grid" title="Choose Accent Color">
                <button class="color-dot purple active" data-color="purple" aria-label="Purple"></button>
                <button class="color-dot green" data-color="green" aria-label="Green"></button>
                <button class="color-dot red" data-color="red" aria-label="Red"></button>
                <button class="color-dot blue" data-color="blue" aria-label="Blue"></button>
                <button class="color-dot orange" data-color="orange" aria-label="Orange"></button>
                <button class="color-dot pink" data-color="pink" aria-label="Pink"></button>
                <button class="color-dot teal" data-color="teal" aria-label="Teal"></button>
                <button class="color-dot yellow" data-color="yellow" aria-label="Yellow"></button>
            </div>
            
            <!-- Upgraded Interactive Theme Toggle Button -->
            <button id="theme-toggle" class="mode-toggle-btn" aria-label="Toggle Mode">
                <div class="mode-icon-box">
                    <i class="fa-solid fa-sun sun-icon"></i>
                    <i class="fa-solid fa-moon moon-icon"></i>
                </div>
            </button>
        </div>
    </header>

    <!-- Core App Interface View Layout -->
    <main class="container">
        <!-- Story Form Component Panel -->
        <section class="form-section">
            <h2 id="form-title">Create a Story</h2>
            <form id="story-form">
                <input type="hidden" id="edit-story-id">

                <div class="input-group">
                    <input type="text" id="story-author" required placeholder=" " aria-label="Author name">
                    <label for="story-author">Your Name</label>
                </div>
                <div class="input-group">
                    <input type="text" id="story-title" required placeholder=" " aria-label="Story title">
                    <label for="story-title">Story Title</label>
                </div>
                <div class="input-group">
                    <textarea id="story-content" rows="7" required placeholder=" " aria-label="Story content"></textarea>
                    <label for="story-content">Write your magic here...</label>
                </div>

                <button type="submit" id="submit-btn" class="submit-btn" aria-label="Publish story">
                    <span id="submit-btn-text">Publish Story</span>
                    <i class="fa-solid fa-paper-plane" id="submit-btn-icon"></i>
                </button>
                <button type="button" id="cancel-edit-btn" class="cancel-btn hidden" aria-label="Cancel editing">Cancel Edit</button>
            </form>
        </section>

        <!-- Live Filter Feed Column Section -->
        <section class="feed-section">
            <div class="search-container">
                <div class="search-icon-wrapper">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
                <input type="text" id="search-stories" class="search-input" placeholder="Search stories by title or author..." aria-label="Search stories">
            </div>
            
            <h2>Recent Stories</h2>
            <div id="stories-container" class="stories-grid"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
